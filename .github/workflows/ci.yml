name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: my-ratelimit-service

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build app test

      - name: Start dependencies (MongoDB + Redis)
        run: docker compose up -d mongo redis

      - name: Wait for dependencies to be healthy
        run: |
          echo "Waiting for MongoDB and Redis to be healthy..."
          for i in $(seq 1 30); do
            MONGO_OK=$(docker exec ratelimit-mongo mongosh --eval "db.runCommand('ping').ok" --quiet 2>/dev/null || echo "0")
            REDIS_OK=$(docker exec ratelimit-redis redis-cli ping 2>/dev/null || echo "")
            if [ "$MONGO_OK" = "1" ] && [ "$REDIS_OK" = "PONG" ]; then
              echo "All dependencies are healthy!"
              break
            fi
            echo "Attempt $i/30 — MongoDB: $MONGO_OK | Redis: $REDIS_OK"
            sleep 5
          done
          docker compose ps

      - name: Run Unit Tests
        run: docker compose run --rm test npm run test:unit

      - name: Run Integration Tests
        run: docker compose run --rm test npm run test:integration

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down services
        if: always()
        run: docker compose down -v

  push-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Skip image push when secrets are missing
        if: env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == ''
        run: echo "DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not set. Skipping image push."

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push production image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
