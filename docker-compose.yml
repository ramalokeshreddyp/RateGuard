services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: ratelimit-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/ratelimitdb
      - REDIS_URL=redis://redis:6379
      - DEFAULT_RATE_LIMIT_MAX_REQUESTS=100
      - DEFAULT_RATE_LIMIT_WINDOW_SECONDS=60
      - INTERNAL_API_KEY=dev-internal-key
      - BCRYPT_ROUNDS=12
      - LOG_LEVEL=info
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    environment:
      - NODE_ENV=test
      - MONGO_URI=mongodb://mongo:27017/ratelimitdb
      - REDIS_URL=redis://redis:6379
      - DEFAULT_RATE_LIMIT_MAX_REQUESTS=100
      - DEFAULT_RATE_LIMIT_WINDOW_SECONDS=60
      - INTERNAL_API_KEY=dev-internal-key
      - BCRYPT_ROUNDS=4
      - LOG_LEVEL=silent
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run test:all

  mongo:
    image: mongo:7.0
    container_name: ratelimit-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=ratelimitdb
    volumes:
      - mongo_data:/data/db
      - ./init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: ratelimit-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  mongo_data:
